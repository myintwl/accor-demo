name: Terraform CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'eks-karpenter-multi-az/**'

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: eks-karpenter-multi-az
  TF_VERSION: 1.9.0

jobs:
  terraform:
    name: Terraform fmt, validate & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ###########################################################################
      # terraform fmt
      ###########################################################################
      - name: Terraform fmt
        id: fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      ###########################################################################
      # terraform init (no backend so validate/test work without AWS creds)
      ###########################################################################
      - name: Terraform Init
        id: init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false
        continue-on-error: true

      ###########################################################################
      # terraform validate
      ###########################################################################
      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color
        continue-on-error: true

      ###########################################################################
      # terraform test  (plan-only, no real AWS calls)
      ###########################################################################
      - name: Terraform Test
        id: test
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform test -no-color 2>&1 | tee /tmp/tf_test_output.txt
        continue-on-error: true

      - name: Read test output
        id: test_output
        run: |
          OUTPUT=$(cat /tmp/tf_test_output.txt)
          # Truncate to 60000 chars to stay within GitHub comment limits
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "${OUTPUT:0:60000}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      ###########################################################################
      # Post results as a PR comment
      ###########################################################################
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmt     = '${{ steps.fmt.outcome }}';
            const init    = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const test    = '${{ steps.test.outcome }}';

            const icon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const testOutput = `${{ steps.test_output.outputs.content }}`;

            const body = `## Terraform CI Results

            | Step | Result |
            |------|--------|
            | \`terraform fmt\` | ${icon(fmt)} ${fmt} |
            | \`terraform init\` | ${icon(init)} ${init} |
            | \`terraform validate\` | ${icon(validate)} ${validate} |
            | \`terraform test\` | ${icon(test)} ${test} |

            <details>
            <summary><b>terraform test output</b></summary>

            \`\`\`
            ${testOutput}
            \`\`\`

            </details>

            > Triggered by commit ${{ github.sha }} on branch \`${{ github.head_ref }}\`
            `;

            // Find and update existing bot comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform CI Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      ###########################################################################
      # Fail the job if any step failed
      ###########################################################################
      - name: Check results
        if: |
          steps.fmt.outcome == 'failure' ||
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure' ||
          steps.test.outcome == 'failure'
        run: |
          echo "One or more Terraform checks failed."
          exit 1
